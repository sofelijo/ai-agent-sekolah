<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Kelulusan - ASKA</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f4f9;
            --chat-container-bg: #fff;
            --header-bg: #4a90e2;
            --user-msg-bg: #4a90e2;
            --bot-msg-bg: #e5e5ea;
            --text-color-light: #fff;
            --text-color-dark: #000;
            --input-border-color: #ccc;
            --input-bg-color: #fff;
            --line-soft: #dbe4f0;
        }

        body.dark-mode {
            --bg-color: #121212;
            --chat-container-bg: #1e1e1e;
            --header-bg: #2c3e50;
            --user-msg-bg: #3498db;
            --bot-msg-bg: #37474f;
            --text-color-light: #fff;
            --text-color-dark: #fff;
            --input-border-color: #444;
            --input-bg-color: #2c3e50;
            --line-soft: #384653;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color-dark);
            margin: 0;
            min-height: 100vh;
        }

        .stage-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .nisn-card {
            width: min(540px, 100%);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border: 1px solid #e7edf6;
            padding: 24px;
            text-align: center;
        }

        body.dark-mode .nisn-card,
        body.dark-mode .info-panel,
        body.dark-mode .chat-input {
            background: var(--chat-container-bg);
            border-color: var(--line-soft);
        }

        .nisn-card h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .nisn-card p {
            color: #5d6c80;
            margin-bottom: 18px;
        }

        .chat-layout {
            display: none;
            min-height: 100vh;
            padding: 16px;
            gap: 18px;
            align-items: center;
            justify-content: center;
        }

        .info-panel {
            width: min(46vw, 560px);
            min-width: 420px;
            height: 80vh;
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--line-soft);
            padding: 0;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: var(--chat-container-bg);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            background-color: var(--header-bg);
            color: var(--text-color-light);
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            min-height: 76px;
        }

        .chat-brand {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .bot-icon {
            font-size: 2rem;
            margin-right: 10px;
            line-height: 1;
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.05;
            color: #fff;
        }

        .brand-subtitle {
            color: #fff;
            font-size: 0.76rem;
            line-height: 1.1;
            opacity: 0.95;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .student-pill {
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 999px;
            padding: 7px 14px;
            color: #fff;
            font-size: 0.86rem;
            font-weight: 700;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-header-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 999px;
            padding: 8px 16px;
            color: #fff;
            font-size: 0.86rem;
            font-weight: 800;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
        }

        .status-header-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #4cd964;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #c73d16;
            color: #fff;
            border: 2px solid #fff;
            font-weight: 800;
            text-transform: uppercase;
        }

        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-msg-bg);
            color: var(--text-color-light);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .bot-message {
            background-color: var(--bot-msg-bg);
            color: var(--text-color-dark);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        body.dark-mode .bot-message {
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-inline-label {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 999px;
            background: #dcfce7;
            color: #15803d;
            font-size: 0.86em;
            font-weight: 800;
            letter-spacing: 0.02em;
            vertical-align: baseline;
            white-space: nowrap;
        }

        .status-inline-label.pending {
            background: #fef3c7;
            color: #a16207;
        }

        .status-inline-label.fail {
            background: #fee2e2;
            color: #b91c1c;
        }

        .chat-input {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 12px 15px;
            border-top: 1px solid var(--input-border-color);
        }

        .chat-input textarea {
            flex-grow: 1;
            border: 1px solid var(--input-border-color);
            background-color: var(--input-bg-color);
            color: var(--text-color-dark);
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 16px;
            max-height: 160px;
            resize: none;
            outline: none;
        }

        .chat-input button,
        .btn-primary-solid {
            background-color: var(--header-bg);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px 14px;
            font-weight: 600;
            min-height: 44px;
        }

{% include "components/aska_typing_indicator_styles.html" %}

        .theme-toggle {
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            border-radius: 999px;
            width: 42px;
            height: 42px;
            padding: 0;
            font-size: 22px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .back-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nisn-theme-toggle {
            width: auto;
            height: auto;
            padding: 7px 10px;
            font-size: 13px;
            border-color: var(--line-soft);
            background: transparent;
            color: var(--text-color-dark);
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
            background: #e8f6ec;
            color: #1d7f3f;
        }

        .status-badge.pending {
            background: #fff2d9;
            color: #8c5a00;
        }

        .status-badge.fail {
            background: #ffe4e4;
            color: #a32323;
        }

        .student-meta {
            color: #5d6c80;
            font-size: 14px;
        }

        .poster-frame {
            position: relative;
            flex: 0 0 auto;
            aspect-ratio: 16 / 9;
            background: #dbeafe;
        }

        .graduation-video,
        .graduation-poster {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .graduation-poster {
            display: none;
        }

        .poster-frame.video-missing .graduation-video {
            display: none;
        }

        .poster-frame.video-missing .graduation-poster {
            display: block;
        }

        .poster-frame.poster-missing .graduation-poster {
            display: none;
        }

        .poster-fallback {
            width: 100%;
            height: 100%;
            display: none;
            padding: 24px;
        }

        .poster-frame.poster-missing .poster-fallback {
            display: block;
        }

        .mobile-poster-message {
            display: none;
        }

        .mobile-poster-bubble {
            width: min(100%, 340px);
            max-width: min(92%, 340px);
            padding: 0;
            overflow: visible;
            background: transparent;
            border: 0;
            line-height: 0;
            white-space: normal;
        }

        .mobile-poster-bubble .poster-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.12);
        }

        .mobile-poster-bubble .graduation-video,
        .mobile-poster-bubble .graduation-poster,
        .mobile-poster-bubble .poster-fallback {
            border-radius: 0;
            padding: 0;
        }

        .poster-info {
            padding: 16px;
            border-top: 1px solid var(--line-soft);
            background: #fff;
            flex: 1;
            overflow-y: auto;
        }

        .congrats-card {
            padding: 12px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 0.92rem;
        }

        body.dark-mode .poster-info,
        body.dark-mode .congrats-card {
            background: rgba(255, 255, 255, 0.05);
        }

        .hidden { display: none !important; }

        @media (max-width: 992px) {
            .chat-layout {
                padding: 0;
            }

            .info-panel {
                display: none;
            }

            .chat-layout {
                gap: 0;
            }

            .chat-container {
                width: 100%;
                height: 100vh;
                max-width: none;
                border-radius: 0;
                box-shadow: none;
            }

            .chat-header {
                border-radius: 0;
                padding: 10px 12px;
                gap: 8px;
            }

            .brand-title {
                font-size: 1.05rem;
            }

            .brand-subtitle,
            .student-pill {
                font-size: 0.7rem;
            }

            .header-actions {
                gap: 7px;
            }

            .student-pill {
                max-width: 88px;
                padding: 6px 9px;
            }

            .status-header-pill {
                display: none;
            }

            .student-avatar,
            .theme-toggle {
                width: 36px;
                height: 36px;
            }

            .chat-message {
                max-width: 85%;
            }

            .mobile-poster-message {
                display: block;
                max-width: min(92%, 340px);
            }
        }
    </style>
</head>
<body>
    <section id="stageLookup" class="stage-wrap">
        <div class="nisn-card">
            <div class="card-top">
                <button class="theme-toggle nisn-theme-toggle" type="button" data-theme-toggle>Mode Gelap</button>
            </div>
            <h1>Cek Kelulusan</h1>
            <p>Masukkan NISN untuk melihat hasil kelulusan dan membuka chat ASKA.</p>
            <form id="lookupForm" class="d-grid gap-2">
                <input id="nisnInput" class="form-control form-control-lg" type="text" inputmode="numeric" pattern="[0-9]+" placeholder="Masukkan NISN" required>
                <button id="lookupBtn" class="btn-primary-solid" type="submit">Cek Kelulusan</button>
                <p id="lookupError" class="text-danger small m-0 hidden"></p>
            </form>
        </div>
    </section>

    <section id="stageChat" class="chat-layout">
        <aside class="info-panel">
            <div class="poster-frame">
                <video class="graduation-video" autoplay muted loop playsinline preload="metadata"
                    poster="{{ graduation_poster_url }}" aria-label="Video kelulusan SDN Semper Barat 01"
                    onerror="this.closest('.poster-frame').classList.add('video-missing');">
                    <source src="{{ graduation_video_url }}" type="video/mp4">
                </video>
                <img class="graduation-poster" src="{{ graduation_poster_url }}" alt="Poster kelulusan SDN Semper Barat 01"
                    onerror="this.closest('.poster-frame').classList.add('poster-missing'); this.remove();">
                <svg class="poster-fallback" viewBox="0 0 280 220" role="img" aria-label="Ilustrasi siswa lulus">
                    <rect x="34" y="154" width="212" height="34" rx="17" fill="#dbeafe"/>
                    <circle cx="140" cy="78" r="38" fill="#ffd6b0"/>
                    <path d="M101 76c8-36 70-38 78 0-18-11-50-12-78 0z" fill="#1f2937"/>
                    <path d="M88 58l52-25 52 25-52 25-52-25z" fill="#243b53"/>
                    <path d="M192 58v36" stroke="#facc15" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="192" cy="98" r="7" fill="#facc15"/>
                    <path d="M97 181c6-42 24-64 43-64s37 22 43 64H97z" fill="#4a90e2"/>
                    <path d="M121 122l19 25 19-25" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M70 129l22 18 30-38" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M198 124h38v48h-38z" fill="#ffffff" stroke="#94a3b8" stroke-width="5"/>
                    <path d="M207 139h20M207 153h16" stroke="#4a90e2" stroke-width="5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="poster-info">
                <h5 class="mb-2">Keterangan Kelulusan</h5>
                <div class="mb-2"><span id="statusBadge" class="status-badge">-</span></div>
                <h6 id="studentName" class="mb-1">-</h6>
                <div id="studentMeta" class="student-meta mb-3">-</div>
                <div class="congrats-card">
                    <strong id="congratsTitle">Informasi</strong>
                    <p id="congratsText" class="mb-0 mt-2" style="white-space: pre-wrap;">-</p>
                </div>
            </div>
        </aside>

        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-brand">
                    <span class="bot-icon" aria-hidden="true">🤖</span>
                    <div>
                        <div class="brand-title">ASKA</div>
                        <div class="brand-subtitle">Agen AI Sekolah Kita</div>
                    </div>
                </div>
                <div class="header-actions">
                    <span id="headerStatusPill" class="status-header-pill">
                        <span class="status-header-dot" aria-hidden="true"></span>
                        <span id="headerStatusText">Kelulusan</span>
                    </span>
                    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Ganti tema">🌙</button>
                    <span id="headerStudentName" class="student-pill">Siswa</span>
                    <span id="headerAvatar" class="student-avatar">S</span>
                    <button id="backBtn" class="back-icon-btn" type="button" title="Ganti NISN" aria-label="Ganti NISN">↩</button>
                </div>
            </div>
            <div id="chatBox" class="chat-box"></div>
            <form id="chatForm" class="chat-input">
                <textarea id="messageInput" placeholder="Ketik pesan... (Shift+Enter untuk baris baru)" rows="1"></textarea>
                <button id="sendBtn" type="submit">🎉 Kirim</button>
            </form>
        </div>
    </section>

    {% include "components/aska_typing_indicator_script.html" %}
    <script>
        const stageLookup = document.getElementById('stageLookup');
        const stageChat = document.getElementById('stageChat');
        const lookupForm = document.getElementById('lookupForm');
        const lookupBtn = document.getElementById('lookupBtn');
        const nisnInput = document.getElementById('nisnInput');
        const lookupError = document.getElementById('lookupError');
        const backBtn = document.getElementById('backBtn');
        const themeButtons = document.querySelectorAll('[data-theme-toggle]');

        const chatBox = document.getElementById('chatBox');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const statusBadge = document.getElementById('statusBadge');
        const studentName = document.getElementById('studentName');
        const studentMeta = document.getElementById('studentMeta');
        const congratsTitle = document.getElementById('congratsTitle');
        const congratsText = document.getElementById('congratsText');
        const headerStudentName = document.getElementById('headerStudentName');
        const headerAvatar = document.getElementById('headerAvatar');
        const headerStatusText = document.getElementById('headerStatusText');
        const graduationVideoUrl = {{ graduation_video_url|tojson }};
        const graduationPosterUrl = {{ graduation_poster_url|tojson }};

        let activeNisn = '';
        let sending = false;
        const typingIndicator = window.createAskaTypingIndicator(chatBox, { indicatorId: 'typing-indicator' });
        const showTypingIndicator = typingIndicator.showTypingIndicator;
        const removeTypingIndicator = typingIndicator.removeTypingIndicator;

        function applyTheme(theme, persist = true) {
            const nextTheme = theme === 'dark' ? 'dark' : 'light';
            document.body.classList.toggle('dark-mode', nextTheme === 'dark');
            themeButtons.forEach((button) => {
                if (button.classList.contains('nisn-theme-toggle')) {
                    button.textContent = nextTheme === 'dark' ? 'Mode Terang' : 'Mode Gelap';
                } else {
                    button.textContent = nextTheme === 'dark' ? '☀️' : '🌙';
                }
            });
            if (persist) {
                if (nextTheme === 'dark') {
                    localStorage.setItem('theme', 'dark');
                } else {
                    localStorage.removeItem('theme');
                }
            }
        }

        function toggleTheme() {
            const nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
            applyTheme(nextTheme);
        }

        function cleanNisn(v) {
            return String(v || '').replace(/[^0-9]/g, '');
        }

        function showLookupError(message) {
            if (!message) {
                lookupError.classList.add('hidden');
                lookupError.textContent = '';
                return;
            }
            lookupError.classList.remove('hidden');
            lookupError.textContent = message;
        }

        function openChatStage() {
            stageLookup.style.display = 'none';
            stageChat.style.display = 'flex';
            messageInput.focus();
        }

        function openLookupStage() {
            stageChat.style.display = 'none';
            stageLookup.style.display = 'flex';
            activeNisn = '';
            chatBox.innerHTML = '';
            messageInput.value = '';
            showLookupError('');
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function decorateBotMessage(text) {
            return escapeHtml(text).replace(/\b(BELUM LULUS|DITUNDA|LULUS)(\s*🎓)?/g, (match, status, icon = '') => {
                const normalized = status.toLowerCase().replace(/\s+/g, '_');
                const tone = normalized === 'belum_lulus' ? ' fail' : normalized === 'ditunda' ? ' pending' : '';
                return `<span class="status-inline-label${tone}">${status}${icon}</span>`;
            });
        }

        function appendMessage(text, role) {
            const el = document.createElement('div');
            el.className = `chat-message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            if (role === 'bot') {
                el.innerHTML = decorateBotMessage(text);
            } else {
                el.textContent = text || '';
            }
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function bindGraduationVideoFallback(root = document) {
            root.querySelectorAll('.graduation-video').forEach((video) => {
                const markMissing = () => {
                    const frame = video.closest('.poster-frame');
                    if (frame) frame.classList.add('video-missing');
                };
                video.addEventListener('error', markMissing, { once: true });
                video.querySelectorAll('source').forEach((source) => {
                    source.addEventListener('error', markMissing, { once: true });
                });
            });
        }

        function isMobileViewport() {
            return window.matchMedia('(max-width: 992px)').matches;
        }

        function appendMobilePosterBubble() {
            if (!isMobileViewport()) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'chat-message bot-message mobile-poster-message mobile-poster-bubble';
            wrapper.innerHTML = `
                <div class="poster-frame">
                    <video class="graduation-video" autoplay muted loop playsinline preload="metadata" poster="${graduationPosterUrl}" aria-label="Video kelulusan SDN Semper Barat 01">
                        <source src="${graduationVideoUrl}" type="video/mp4">
                    </video>
                    <img class="graduation-poster" src="${graduationPosterUrl}" alt="Poster kelulusan SDN Semper Barat 01">
                    <svg class="poster-fallback" viewBox="0 0 280 220" role="img" aria-label="Ilustrasi siswa lulus">
                        <rect x="34" y="154" width="212" height="34" rx="17" fill="#dbeafe"></rect>
                        <circle cx="140" cy="78" r="38" fill="#ffd6b0"></circle>
                        <path d="M101 76c8-36 70-38 78 0-18-11-50-12-78 0z" fill="#1f2937"></path>
                        <path d="M88 58l52-25 52 25-52 25-52-25z" fill="#243b53"></path>
                        <path d="M192 58v36" stroke="#facc15" stroke-width="6" stroke-linecap="round"></path>
                        <circle cx="192" cy="98" r="7" fill="#facc15"></circle>
                        <path d="M97 181c6-42 24-64 43-64s37 22 43 64H97z" fill="#4a90e2"></path>
                        <path d="M121 122l19 25 19-25" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M70 129l22 18 30-38" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M198 124h38v48h-38z" fill="#ffffff" stroke="#94a3b8" stroke-width="5"></path>
                        <path d="M207 139h20M207 153h16" stroke="#4a90e2" stroke-width="5" stroke-linecap="round"></path>
                    </svg>
                </div>
            `;
            bindGraduationVideoFallback(wrapper);
            const img = wrapper.querySelector('img');
            if (img) {
                img.addEventListener('error', () => {
                    const frame = wrapper.querySelector('.poster-frame');
                    if (frame) frame.classList.add('poster-missing');
                    img.remove();
                }, { once: true });
            }
            chatBox.appendChild(wrapper);
        }

        bindGraduationVideoFallback();

        function renderHistory(items) {
            chatBox.innerHTML = '';
            appendMobilePosterBubble();
            if (!items || items.length === 0) {
                appendMessage('Halo! Aku ASKA 🤖 Kamu boleh tanya tentang sekolah ke aku ya 😊', 'bot');
                return;
            }
            items.forEach((item) => appendMessage(item.text || '', item.role === 'user' ? 'user' : 'bot'));
        }

        function renderStudent(student) {
            const fullName = student.nama_siswa || '-';
            const firstName = fullName.split(/\s+/)[0] || 'Siswa';
            studentName.textContent = fullName;
            studentMeta.textContent = `NISN ${student.nisn || '-'} | ${student.kelas || '-'} | Tahun ${student.tahun_lulus || '-'}`;
            headerStudentName.textContent = firstName;
            headerAvatar.textContent = firstName.slice(0, 1) || 'S';
            headerStatusText.textContent = student.status_label || 'Kelulusan';

            statusBadge.textContent = student.status_label || '-';
            statusBadge.classList.remove('pending', 'fail');
            if ((student.status || '') === 'ditunda') statusBadge.classList.add('pending');
            if ((student.status || '') === 'belum_lulus') statusBadge.classList.add('fail');

            congratsTitle.textContent = (student.status || '') === 'lulus' ? 'Ucapan Selamat' : 'Keterangan Sekolah';
            const extra = [];
            if (student.tanggal_pengumuman) extra.push(`Tanggal pengumuman: ${student.tanggal_pengumuman}`);
            if (student.pesan_aska) extra.push(student.pesan_aska);
            congratsText.textContent = extra.length ? extra.join('\n') : 'Silakan lanjutkan tanya jawab di chat.';
        }

        lookupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nisn = cleanNisn(nisnInput.value);
            if (!nisn || nisn.length < 6) {
                showLookupError('NISN minimal 6 digit.');
                return;
            }

            lookupBtn.disabled = true;
            lookupBtn.textContent = 'Memeriksa...';
            showLookupError('');

            try {
                const res = await fetch('/api/kelulusan/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nisn })
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    showLookupError(data.message || 'Data tidak ditemukan.');
                    return;
                }

                activeNisn = nisn;
                renderStudent(data.student || {});
                renderHistory(data.history || []);
                openChatStage();
            } catch (err) {
                showLookupError('Terjadi masalah jaringan. Coba lagi.');
            } finally {
                lookupBtn.disabled = false;
                lookupBtn.textContent = 'Cek Kelulusan';
            }
        });

        backBtn.addEventListener('click', () => {
            openLookupStage();
            nisnInput.focus();
        });

        themeButtons.forEach((button) => {
            button.addEventListener('click', toggleTheme);
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (sending || !activeNisn) return;
            const message = (messageInput.value || '').trim();
            if (!message) return;

            appendMessage(message, 'user');
            messageInput.value = '';
            sending = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'Mengirim...';
            showTypingIndicator();

            try {
                const res = await fetch('/api/kelulusan/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nisn: activeNisn, message })
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    appendMessage(data.message || 'Pesan gagal diproses.', 'bot');
                    return;
                }
                appendMessage(data.response || '-', 'bot');
                if (data.student) renderStudent(data.student);
            } catch (err) {
                appendMessage('Koneksi ke server terputus.', 'bot');
            } finally {
                sending = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Kirim';
                removeTypingIndicator();
                messageInput.focus();
            }
        });

        applyTheme(localStorage.getItem('theme') === 'dark' ? 'dark' : 'light', false);
    </script>
</body>
</html>
